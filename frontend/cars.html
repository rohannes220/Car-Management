<!DOCTYPE html>
<html>

<head>
    <title>Cars</title>
    <link rel="stylesheet" href="css/styles.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

    <div class="navbar">
        <a href="index.html">Welcome</a>
        <a href="cars.html">Cars</a>
        <a href="sales.html">Sales</a>
    </div>

    <div class="inventory-card">

        <h1>Car Inventory</h1>

        <div class="inventory-controls">

            <div id="react-root"></div>

            <button onclick="totalCars()">Total Cars</button>
            <button onclick="totalAvailable()">Total Available Cars</button>
            <button onclick="totalSold()">Total Sold Cars</button>

            <span id="result"></span>

        </div>

        <table>

            <thead>
                <tr>
                    <th>Make</th>
                    <th>Model</th>
                    <th>Year</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="car-table-body"></tbody>

        </table>

    </div>

    <script src="js/script.js"></script>
    <script type="text/babel" src="react/AddCar.js"></script>
    <script type="text/babel" src="react/UpdateCar.js"></script>
    <script type="text/babel" src="react/main.js"></script>

</body>

</html>
